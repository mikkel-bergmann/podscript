name: Docs examples
on:
  push:
  pull_request:
jobs:
  examples-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check tagged docs examples match committed files
        run: python3 .github/scripts/check_doc_examples.py
